<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geremie PONG GAME</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#050510,#0a0a25);
color:white;
text-align:center;
overflow:hidden;
}

/* MENU SCREENS */

.screen{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:rgba(0,0,0,0.8);
}

h1{
font-size:60px;
color:#00ffff;
text-shadow:0 0 20px #00ffff;
}

button{
padding:15px 35px;
font-size:20px;
margin-top:20px;
border:none;
background:#00ffff;
color:black;
cursor:pointer;
border-radius:8px;
box-shadow:0 0 15px #00ffff;
}

button:hover{
background:white;
}

/* GAME AREA */

#gameCanvas{
background:#000;
display:block;
margin:auto;
box-shadow:0 0 25px #00ffff;
}

/* SCORE */

#scoreBoard{
position:absolute;
top:10px;
width:100%;
font-size:30px;
text-shadow:0 0 10px cyan;
}

@media(max-width:700px){

h1{
font-size:40px;
}

#scoreBoard{
font-size:20px;
}

}

</style>
</head>

<body>

<div id="menu" class="screen">
<h1>Geremie PONG GAME</h1>
<h2>join us on our New Editoin</h2>
<h3>Powerd by Geremie</h3>
<button onclick="startGame()">START GAME</button>
</div>

<div id="gameOver" class="screen" style="display:none">
<h1 id="winnerText">Winner</h1>
<button onclick="restartGame()">PLAY AGAIN</button>
</div>

<div id="scoreBoard">
YOU: <span id="playerScore">0</span> |
Geremie: <span id="aiScore">0</span>
</div>

<canvas id="gameCanvas"></canvas>

<script>

const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let paddleHeight=120;
let paddleWidth=15;

let player={
x:30,
y:canvas.height/2-paddleHeight/2,
score:0
};

let ai={
x:canvas.width-45,
y:canvas.height/2-paddleHeight/2,
score:0
};

let ball={
x:canvas.width/2,
y:canvas.height/2,
size:12,
speed:6,
dx:6,
dy:4
};

let gameRunning=false;

/* DRAW FUNCTIONS */

function drawRect(x,y,w,h){
ctx.fillStyle="#00ffff";
ctx.shadowBlur=20;
ctx.shadowColor="#00ffff";
ctx.fillRect(x,y,w,h);
}

function drawBall(){
ctx.beginPath();
ctx.arc(ball.x,ball.y,ball.size,0,Math.PI*2);
ctx.fillStyle="white";
ctx.shadowBlur=25;
ctx.shadowColor="cyan";
ctx.fill();
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

drawRect(player.x,player.y,paddleWidth,paddleHeight);
drawRect(ai.x,ai.y,paddleWidth,paddleHeight);
drawBall();

}

/* BALL PHYSICS */

function updateBall(){

ball.x+=ball.dx;
ball.y+=ball.dy;

if(ball.y<0 || ball.y>canvas.height){
ball.dy*=-1;
}

/* PLAYER COLLISION */

if(ball.x<player.x+paddleWidth &&
ball.y>player.y &&
ball.y<player.y+paddleHeight){

ball.dx*=-1;
}

/* AI COLLISION */

if(ball.x>ai.x &&
ball.y>ai.y &&
ball.y<ai.y+paddleHeight){

ball.dx*=-1;
}

/* SCORE */

if(ball.x<0){

ai.score++;
updateScore();
resetBall();

}

if(ball.x>canvas.width){

player.score++;
updateScore();
resetBall();

}

}

/* AI MOVEMENT */

function moveAI(){

let center=ai.y+paddleHeight/2;

if(center<ball.y){
ai.y+=5;
}else{
ai.y-=5;
}

}

/* BALL RESET */

function resetBall(){

ball.x=canvas.width/2;
ball.y=canvas.height/2;
ball.dx*=-1;

checkWinner();

}

/* SCORE UPDATE */

function updateScore(){

document.getElementById("playerScore").textContent=player.score;
document.getElementById("aiScore").textContent=ai.score;

}

/* WIN CONDITION */

function checkWinner(){

if(player.score==5){

endGame("YOU WIN!");

}

if(ai.score==5){

endGame("COMPUTER WINS");

}

}

/* GAME LOOP */

function gameLoop(){

if(!gameRunning) return;

updateBall();
moveAI();
draw();

requestAnimationFrame(gameLoop);

}

/* START GAME */

function startGame(){

document.getElementById("menu").style.display="none";

gameRunning=true;
gameLoop();

}

/* END GAME */

function endGame(text){

gameRunning=false;

document.getElementById("winnerText").textContent=text;

document.getElementById("gameOver").style.display="flex";

}

/* RESTART */

function restartGame(){

player.score=0;
ai.score=0;

updateScore();

document.getElementById("gameOver").style.display="none";

gameRunning=true;

resetBall();

gameLoop();

}

/* PLAYER CONTROL */

document.addEventListener("mousemove",(e)=>{

player.y=e.clientY-paddleHeight/2;

});

/* MOBILE TOUCH */

document.addEventListener("touchmove",(e)=>{

player.y=e.touches[0].clientY-paddleHeight/2;

});

/* RESIZE */

window.addEventListener("resize",()=>{

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

ai.x=canvas.width-45;

});

</script>

</body><footer>2026@ishimwe Geremie</footer>
</html>
